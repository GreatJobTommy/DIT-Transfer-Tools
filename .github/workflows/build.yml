name: CI Build & Test

on:
  push:
    branches: [ main, feature-* ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Qt6
      run: |
        sudo apt update
        sudo apt install qt6-base-dev qt6-tools-dev qmake6 ninja-build
    
    - name: Build
      run: |
        qmake6 DIT.pro
        make -j3
    
    - name: Test
      run: |
        make check || echo \"Tests optional\"
    
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools
        path: DIT
