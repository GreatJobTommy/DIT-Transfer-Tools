name: Build DIT-Transfer-Tools

on:
  push:
    branches: [ main, 'feature-*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y qt6-base-dev qt6-tools-dev qt6-qmake build-essential

    - name: Install Qt (Windows)
      if: matrix.os == 'windows-latest'
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.7.0'

    - name: Install Qt (macOS)
      if: matrix.os == 'macos-latest'
      run: brew install qt@6

    - name: Build (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: qmake6 DIT.pro && make -j$(nproc)

    - name: Build (Windows)
      if: matrix.os == 'windows-latest'
      shell: cmd
      run: |
        qmake6 DIT.pro
        nmake

    - name: Build (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        export PATH=&quot;/opt/homebrew/opt/qt@6/bin:$PATH&quot;
        qmake6 DIT.pro
        make -j4

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DIT-${{ matrix.os }}
        path: DIT
        retention-days: 1