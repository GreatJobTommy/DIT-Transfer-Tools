name: Build DIT-Transfer-Tools

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Qt
      run: sudo apt-get update && sudo apt-get install -y qt6-base-dev cmake build-essential
    - name: Build
      run: mkdir build && cd build && cmake .. && make -j4
    - name: Test
      run: cd build && ctest --output-on-failure

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - name: Setup MSVC
      uses: microsoft/setup-msvc@v1
    - name: Install Qt
      uses: jurplel/install-qt-action@v3
      with:
        version: '6.5.3'
    - name: Build
      run: |
        mkdir build
        cd build
        cmake .. -G "NMake Makefiles"
        nmake
    - name: Test
      run: cd build && ctest --output-on-failure

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - name: Install Qt
      run: brew install qt6 cmake
    - name: Build
      run: mkdir build && cd build && cmake .. && make -j4
    - name: Test
      run: cd build && ctest --output-on-failure