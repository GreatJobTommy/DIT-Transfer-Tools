name: Build DIT-Transfer-Tools

on:
  push:
    branches: [ main, 'feature-*' ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'

    - name: Configure CMake
      shell: bash
      run: |
        rm -rf build
        mkdir build
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        else
          cmake .. -DCMAKE_BUILD_TYPE=Release
        fi

    - name: Build
      shell: bash
      run: |
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake --build . --config Release
        else
          cmake --build . --parallel
        fi

    - name: Test
      shell: bash
      run: |
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          ctest -C Release -V
        else
          ctest -V
        fi

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DIT-${{ matrix.os }}
        path: |
          build/DIT-Transfer-Tools*
          build/Release/DIT-Transfer-Tools*
        retention-days: 1

    - name: Package Unsigned macOS DMG
      if: matrix.os == 'macos-latest'
      run: |
        mkdir -p dist dist/unsigned
        APP_PATH="build/DIT-Transfer-Tools.app"
        DMG_BASE="dist/DIT-Transfer-Tools-macos"
        echo "Skipping signing (no secrets in CI)"
        cp -r "$APP_PATH" "dist/unsigned/" || true
        hdiutil create -srcfolder "$APP_PATH" -volname "DIT Transfer Tools Unsigned" -fs HFS+ -format UDZO "${DMG_BASE}-unsigned.dmg" || true

    - name: Upload macOS Artifacts
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: DIT-macos-artifacts
        path: |
          dist/DIT-Transfer-Tools-macos-*.dmg
          dist/unsigned/DIT-Transfer-Tools.app
        retention-days: 7
