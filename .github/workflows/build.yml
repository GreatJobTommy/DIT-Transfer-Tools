name: Build DIT-Transfer-Tools

on:
  push:
    branches: [ main, 'feature-*' ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'

    - name: Configure CMake
      shell: bash
      run: |
        rm -rf build
        mkdir build
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release
        else
          cmake .. -DCMAKE_BUILD_TYPE=Release
        fi

    - name: Build
      shell: bash
      run: |
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          cmake --build . --config Release
        else
          cmake --build . --parallel
        fi

    - name: Test
      shell: bash
      run: |
        cd build
        if [ "${{ runner.os }}" = "Windows" ]; then
          ctest -C Release -V
        else
          ctest -V
        fi

    - name: Upload Binary Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DIT-${{ matrix.os }}
        path: |
          build/DIT-Transfer-Tools*
          build/Release/DIT-Transfer-Tools*
        retention-days: 1

    - name: Package and Sign macOS DMG
      if: matrix.os == 'macos-latest'
      env:
        MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
        MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        APPLE_ID: ${{ secrets.APPLE_ID }}
        APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
        APPLE_ISSUING_CA: ${{ secrets.APPLE_ISSUING_CA }}
        APPLE_P8_PRIVATE_KEY: ${{ secrets.APPLE_P8_PRIVATE_KEY }}
      run: |
        # Create keychain
        security create-keychain \\
          -p "$KEYCHAIN_PASSWORD" \\
          build.keychain
        security default-keychain -s build.keychain
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
        # Import certificate
        echo "$MACOS_CERTIFICATE" | base64 -D > cert.p12
        security import cert.p12 \\
          -k build.keychain \\
          -P "$MACOS_CERTIFICATE_PASSWORD" \\
          -T /usr/bin/codesign
        security set-key-partition-list \\
          -S apple-tool:,apple: \\
          -s \\
          -k "$KEYCHAIN_PASSWORD" \\
          build.keychain
        # Create entitlements
        cat > entitlements.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
          <key>com.apple.security.app-sandbox</key>
          <false/>
          <key>com.apple.security.network.client</key>
          <true/>
          <key>com.apple.security.network.server</key>
          <true/>
          <key>com.apple.security.files.user-selected.read-only</key>
          <true/>
        </dict>
        </plist>
        EOF
        APP_PATH="build/DIT-Transfer-Tools.app"
        # Sign app
        codesign --force --deep --options=runtime --entitlements entitlements.plist --sign "$SIGNING_IDENTITY" --timestamp "$APP_PATH"
        # Create DMG
        DMG_PATH="DIT-Transfer-Tools.dmg"
        hdiutil create -srcfolder "$APP_PATH" -volname "DIT Transfer Tools" -fs HFS+ -format UDZO "$DMG_PATH"
        # Sign DMG
        codesign --force --sign "$SIGNING_IDENTITY" --timestamp "$DMG_PATH"
        # Notarize
        mkdir -p ~/.appstoreconnect/private_keys
        echo "$APPLE_P8_PRIVATE_KEY" | base64 -d > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_KEY_ID}.p8
        xcrun notarytool submit "$DMG_PATH" --apple-id "$APPLE_ID" --team-id "$APPLE_TEAM_ID" --key "~/.appstoreconnect/private_keys/AuthKey_${APPLE_KEY_ID}.p8" --key-id "$APPLE_KEY_ID" --issuing-ca "$APPLE_ISSUING_CA" --wait
        # Staple
        xcrun stapler staple "$DMG_PATH"
