name: Release DIT-Transfer-Tools

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  linux-appimage:
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          qt6-base-dev \
          qt6-tools-dev \
          qt6-tools-dev-tools

    - name: Build
      run: |
        cmake -S . -B build -GNinja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
        cmake --build build --config Release

    - name: Download linuxdeploy
      run: |
        curl -sL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o linuxdeploy-x86_64.AppImage
        curl -sL https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -o linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-*.AppImage

    - name: Package AppImage
      run: |
        mkdir -p AppDir/usr/{bin,share/applications}
        cp build/DIT-Transfer-Tools AppDir/usr/bin/
        cat > AppDir/usr/share/applications/DIT-Transfer-Tools.desktop << EOF
        [Desktop Entry]
        Name=DIT Transfer Tools
        Comment=Transfer tools for DIT
        Exec=DIT-Transfer-Tools
        Icon=DIT-Transfer-Tools
        Terminal=false
        Type=Application
        Categories=Utility;FileTools;
        EOF
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/DIT-Transfer-Tools.desktop \
          --plugin qt \
          --output appimage

    - name: Signing Placeholder (Linux)
      run: |
        echo "Linux AppImage signing optional - add if needed"

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools-Linux-AppImage
        path: DIT-Transfer-Tools*.AppImage
        retention-days: 30

  macos-dmg:
    runs-on: macos-14
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        brew install cmake ninja qt@6 node

    - name: Build
      run: |
        QT_PREFIX=$(brew --prefix qt@6)
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DCMAKE_PREFIX_PATH=${QT_PREFIX}
        cmake --build build --config Release

    - name: Deploy Qt app bundle
      run: |
        QT_PREFIX=$(brew --prefix qt@6)
        mkdir -p DIT-Transfer-Tools.app/Contents/MacOS
        cp build/DIT-Transfer-Tools DIT-Transfer-Tools.app/Contents/MacOS/DIT-Transfer-Tools
        ${QT_PREFIX}/bin/macdeployqt DIT-Transfer-Tools.app -verbose=1

    - name: Install create-dmg
      run: npm install -g create-dmg

    - name: Create DMG
      run: create-dmg "DIT-Transfer-Tools.app" "DIT-Transfer-Tools-macos.dmg"

    - name: Notarization Placeholder
      run: |
        echo "macOS notarization placeholder"
        # Uncomment and configure secrets when ready:
        # xcrun notarytool submit DIT-Transfer-Tools-macos.dmg \
        #   --apple-id "${{ secrets.APPLE_ID }}" \
        #   --apple-id-password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
        #   --team-id "${{ secrets.APPLE_TEAM_ID }}" \
        #   --wait
        # xcrun stapler staple DIT-Transfer-Tools-macos.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools-macos.dmg
        path: DIT-Transfer-Tools-macos.dmg
        retention-days: 30

  windows-nsis:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'

    - name: Configure CMake
      shell: bash
      run: |
        rm -rf build
        mkdir build
        cd build
        cmake .. -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build
      shell: bash
      run: |
        cd build
        cmake --build . --config Release

    - name: Deploy Qt app
      shell: cmd
      run: |
        mkdir DIT-Transfer-Tools
        copy "build\Release\DIT-Transfer-Tools.exe" "DIT-Transfer-Tools\DIT-Transfer-Tools.exe"
        windeployqt.exe "DIT-Transfer-Tools" --release --compiler-runtime --no-translations

    - name: Install Chocolatey
      shell: powershell
      run: |
        Set-ExecutionPolicy Bypass -Scope Process -Force; [System.Net.ServicePointManager]::SecurityProtocol = [System.Net.ServicePointManager]::SecurityProtocol -bor 3072; iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))

    - name: Install NSIS
      shell: powershell
      run: |
        choco install nsis -y --force
        echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

    - name: Create installer.nsi
      shell: bash
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        PRODVER=${VERSION}.0
    !include "MUI2.nsh"
    !define MUI_ABORTWARNING
    !define APPNAME "DIT Transfer Tools"
    !define APPVERSION "PLACEHOLDER_VERSION"
    Name "\${APPNAME} \${APPVERSION}"
    OutFile "DIT-Transfer-Tools-setup.exe"
    InstallDirRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\${APPNAME}" "InstallLocation"
    RequestExecutionLevel admin
    VIProductVersion "PLACEHOLDER_PRODVER"
    VIAddVersionKey "ProductName" "\${APPNAME}"
    VIAddVersionKey "CompanyName" "GreatJobTommy"
    VIAddVersionKey "FileDescription" "\${APPNAME} Installer"
    Page directory
    Page instfiles
    UninstPage instfiles
    Section "Program"
      SetOutPath "$INSTDIR"
      File /r "DIT-Transfer-Tools\*.*"
      CreateDirectory "$SMPROGRAMS\${APPNAME}"
      CreateShortcut "$SMPROGRAMS\${APPNAME}\${APPNAME}.lnk" "$INSTDIR\DIT-Transfer-Tools.exe"
      CreateShortcut "$DESKTOP\${APPNAME}.lnk" "$INSTDIR\DIT-Transfer-Tools.exe"
      WriteUninstaller "$INSTDIR\uninstall.exe"
      WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\${APPNAME}" "DisplayName" "${APPNAME}"
      WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\${APPNAME}" "UninstallString" "$INSTDIR\uninstall.exe"
      WriteRegStr HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\${APPNAME}" "InstallLocation" "$INSTDIR"
    SectionEnd
    Section "Uninstall"
      Delete "$INSTDIR\uninstall.exe"
      RMDir /r "$INSTDIR"
      Delete "$SMPROGRAMS\${APPNAME}\${APPNAME}.lnk"
      RMDir "$SMPROGRAMS\${APPNAME}"
      Delete "$DESKTOP\${APPNAME}.lnk"
      DeleteRegKey HKLM "Software\Microsoft\Windows\CurrentVersion\Uninstall\${APPNAME}"
    SectionEnd
EOF
        sed -i "s|PLACEHOLDER_VERSION|${VERSION}|g" installer.nsi
        sed -i "s|PLACEHOLDER_PRODVER|${PRODVER}|g" installer.nsi

    - name: Build NSIS installer
      shell: cmd
      run: makensis.exe installer.nsi

    - name: Signing Placeholder (Windows)
      shell: cmd
      run: |
        echo Signing placeholder - configure secrets
        REM signtool sign /fd sha256 /tr http://timestamp.digicert.com /td sha256 /f "%USERPROFILE%\.codesign\cert.pfx" /p "pass" DIT-Transfer-Tools-setup.exe
        REM Example: download PFX from secrets.CODE_SIGNING_PFX_BASE64 | base64 -d > cert.pfx

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools-windows-nsis
        path: DIT-Transfer-Tools-setup.exe
        retention-days: 30

  create-release:
    runs-on: ubuntu-latest
    needs: [linux-appimage, macos-dmg, windows-nsis]
    steps:
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        pattern: DIT-Transfer-Tools-*
        merge-multiple: true

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y jq

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        # Create release
        cat > payload.json << EOF
        {
          "tag_name": "${{ github.ref_name }}",
          "name": "DIT Transfer Tools ${{ github.ref_name }}",
          "generate_release_notes": true
        }
        EOF
        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/${{ github.repository }}/releases \
          -d @payload.json | jq -r .id)

        # Upload assets
        for file in artifacts/*/*; do
          if [ -f "$file" ]; then
            echo "Uploading $file..."
            curl -s -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/octet-stream" \
              https://api.github.com/repos/${{ github.repository }}/releases/$RELEASE_ID/assets \
              --data-binary "@$file" \
              -o /dev/null
          fi
        done
        echo "Release created with ID $RELEASE_ID"
