name: macOS DMG

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.ui'
      - 'CMakeLists.txt'
      - '.github/workflows/macos-dmg.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.ui'
      - 'CMakeLists.txt'
      - '.github/workflows/macos-dmg.yml'
permissions:
  contents: read

jobs:
  build:
    if: false
    runs-on: macos-14
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      id: install-qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'

    - name: Setup Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: |
        brew install cmake ninja

    - name: Build
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DCMAKE_PREFIX_PATH=${{ steps.install-qt.outputs.dir }}
        cmake --build build --config Release

    - name: Deploy Qt app bundle
      run: |
        mkdir -p DIT-Transfer-Tools.app/Contents/MacOS
        cp build/DIT-Transfer-Tools DIT-Transfer-Tools.app/Contents/MacOS/
        macdeployqt DIT-Transfer-Tools.app -verbose=2

    - name: Validate bundle
      run: |
        ls -la DIT-*.app
        if [[ ! -d DIT-Transfer-Tools.app ]]; then
          echo "No app bundle created"
          exit 1
        fi
        ls -la DIT-Transfer-Tools.app/Contents/

    - name: Install create-dmg
      run: npm install -g create-dmg

    - name: Create DMG
      run: create-dmg "DIT-Transfer-Tools.app" "DIT-Transfer-Tools-macos.dmg"

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools-macos.dmg
        path: DIT-Transfer-Tools-macos.dmg
        retention-days: 30
