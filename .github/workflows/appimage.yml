name: Linux AppImage

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.ui'
      - 'CMakeLists.txt'
      - '.github/workflows/appimage.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**/*.cpp'
      - '**/*.h'
      - '**/*.ui'
      - 'CMakeLists.txt'
      - '.github/workflows/appimage.yml'
permissions:
  contents: read

jobs:
  build:
    if: false
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install Qt
      id: install-qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.6.2'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build

    - name: Build
      run: |
        cmake -S . -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
          -DCMAKE_PREFIX_PATH=${{ steps.install-qt.outputs.dir }}
        cmake --build build --config Release

    - name: Download linuxdeploy
      run: |
        curl -sL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o linuxdeploy-x86_64.AppImage
        curl -sL https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage -o linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-*.AppImage

    - name: Package AppImage
      run: |
        mkdir -p AppDir/usr/{bin,share/applications}
        cp build/DIT-Transfer-Tools AppDir/usr/bin/
        cat > AppDir/usr/share/applications/DIT-Transfer-Tools.desktop << EOF
        [Desktop Entry]
        Name=DIT Transfer Tools
        Comment=Transfer tools for DIT
        Exec=DIT-Transfer-Tools
        Terminal=false
        Type=Application
        Categories=Utility;FileTools;
        EOF
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --desktop-file AppDir/usr/share/applications/DIT-Transfer-Tools.desktop \
          --plugin qt \
          --output appimage

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: DIT-Transfer-Tools-Linux-AppImage
        path: DIT-Transfer-Tools*.AppImage
        retention-days: 30
