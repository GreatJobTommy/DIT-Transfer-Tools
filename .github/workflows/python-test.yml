name: Python Tests
on:
  push:
    branches: [ main, fix/* ]
  pull_request:
    branches: [ main ]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Upgrade pip
      run: pip install --upgrade pip setuptools wheel

    - name: Install package and dev dependencies
      run: pip install -e .[dev]
    - name: Install rclone
      run: curl https://rclone.org/install.sh | sudo bash
    - name: Test with pytest
      run: pytest tests/python/ --cov=dit_transfer --cov-report=term-missing --cov-fail-under=84 -v --tb=short
    - name: Lint with black
      run: black --check .
    - name: Lint with ruff
      run: ruff check .
    - name: Type check with mypy
      run: mypy dit_transfer --ignore-missing-imports